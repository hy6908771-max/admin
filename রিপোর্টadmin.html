<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorif Telecom - Admin Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: linear-gradient(135deg, #fff5f7 0%, #ffffff 100%); color: #444; font-family: 'Segoe UI', sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .admin-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border: 1px solid #ffb6c1; border-radius: 24px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.2); }
        .premium-input { background: #fff; border: 2px solid #ffe4e8; color: #333; padding: 12px 16px; border-radius: 12px; width: 100%; margin-bottom: 15px; outline: none; }
        .save-btn { background: linear-gradient(90deg, #ff69b4 0%, #ff1493 100%); color: white; padding: 14px 20px; border-radius: 12px; font-weight: bold; width: 100%; transition: transform 0.2s; cursor: pointer; border: none; }
        .save-btn:active { transform: scale(0.98); }
        .plus-icon-btn { color: #ff1493; font-weight: bold; display: inline-flex; align-items: center; margin-bottom: 15px; cursor: pointer; }
        .list-item { background: #fff; border-radius: 15px; padding: 15px; border: 1px solid #eee; margin-top: 10px; position: relative; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .pending-badge { background: #fffbeb; color: #b45309; padding: 2px 8px; border-radius: 5px; font-size: 10px; border: 1px solid #fde68a; }
        #appLogoPreview { max-width: 100px; height: auto; border-radius: 15px; margin-top: 10px; display: none; }
    </style>
</head>
<body class="p-4 max-w-4xl mx-auto">

    <div class="flex items-center gap-4 mb-6">
        <div id="logoContainer">
            <img id="displayAppLogo" src="" alt="" class="w-12 h-12 rounded-xl hidden">
        </div>
        <h1 id="displayAppName" class="text-3xl font-extrabold text-pink-600">Admin Control Panel</h1>
    </div>

    <!-- App Settings -->
    <div class="admin-card">
        <h2 class="text-xl font-bold mb-4">⚙️ অ্যাপ সেটিংস (নাম ও লোগো)</h2>
        <input type="text" id="setupName" placeholder="অ্যাপের নাম" class="premium-input">
        <input type="text" id="setupLogo" placeholder="লোগো ইউআরএল" class="premium-input" oninput="previewLogo(this.value)">
        <img id="appLogoPreview" src="" alt="Preview">
        <button onclick="saveSettings()" class="save-btn mt-4">সেভ করুন</button>
    </div>

    <!-- Banner Management -->
    <div class="admin-card">
        <h2 class="text-xl font-bold mb-4">🖼️ ব্যানার ম্যানেজমেন্ট</h2>
        <div id="bannerInputs">
            <input type="text" placeholder="ব্যানার ইমেজ ইউআরএল" class="premium-input banner-url">
        </div>
        <div onclick="addInput('bannerInputs', 'banner-url')" class="plus-icon-btn">➕ আরও ব্যানার যোগ করুন</div>
        <button onclick="saveBanners()" class="save-btn mb-4">ব্যানার পাবলিশ করুন</button>
        
        <h3 class="font-bold border-t pt-4">বর্তমান ব্যানার:</h3>
        <div id="activeBanners" class="grid grid-cols-1 gap-2 mt-2"></div>
    </div>

    <!-- Report Add Form -->
    <div class="admin-card">
        <h2 class="text-xl font-bold mb-4">⚠️ নতুন রিপোর্ট অ্যাড করুন</h2>
        <input type="number" id="repNum" placeholder="ইউজার মোবাইল নাম্বার" class="premium-input">
        <textarea id="repMsg" placeholder="বিস্তারিত লিখুন..." class="premium-input" rows="3"></textarea>
        <div id="repPhotoInputs">
            <input type="text" placeholder="ছবির লিঙ্ক" class="premium-input rep-photo">
        </div>
        <div onclick="addInput('repPhotoInputs', 'rep-photo')" class="plus-icon-btn">➕ ছবি যোগ করুন</div>
        <button onclick="saveReport()" class="save-btn">রিপোর্ট সেভ করুন</button>
    </div>

    <!-- Active Reports List -->
    <div class="admin-card">
        <h2 class="text-xl font-bold mb-4">📋 পাবলিশ হওয়া রিপোর্টসমূহ</h2>
        <div id="activeReportsList" class="space-y-3"></div>
    </div>

    <!-- Customer Pending Reports -->
    <div class="admin-card border-orange-200">
        <h2 class="text-xl font-bold text-orange-600 mb-4">📩 পেন্ডিং রিপোর্ট (কাস্টমার থেকে)</h2>
        <div id="pendingReportsList" class="space-y-3">
            <p class="text-gray-400 text-center italic">কোনো নতুন রিপোর্ট নেই</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBUHPAvntPpcoZjCLxYVMFFdARz7jXA2Lk",
            databaseURL: "https://shorif-telicom-default-rtdb.firebaseio.com",
            projectId: "shorif-telicom"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ১. লোড সেটিংস
        db.ref('settings').on('value', snap => {
            if(snap.exists()){
                const data = snap.val();
                document.getElementById('setupName').value = data.name || "";
                document.getElementById('setupLogo').value = data.logo || "";
                if(data.name) document.getElementById('displayAppName').innerText = data.name;
                if(data.logo) {
                    const img = document.getElementById('displayAppLogo');
                    img.src = data.logo;
                    img.classList.remove('hidden');
                }
            }
        });

        function previewLogo(url) {
            const preview = document.getElementById('appLogoPreview');
            if(url) { preview.src = url; preview.style.display = "block"; }
            else { preview.style.display = "none"; }
        }

        function saveSettings() {
            const name = document.getElementById('setupName').value;
            const logo = document.getElementById('setupLogo').value;
            if(!name) return alert("অ্যাপের নাম দিন!");
            db.ref('settings').set({ name, logo }).then(() => alert("অ্যাপ সেটিংস আপডেট হয়েছে!"));
        }

        function addInput(divId, className) {
            const input = document.createElement('input');
            input.type = 'text'; input.placeholder = 'লিঙ্ক দিন';
            input.className = 'premium-input ' + className;
            document.getElementById(divId).appendChild(input);
        }

        // --- আপডেট করা ব্যানার ফাংশন ---
        function saveBanners() {
            const els = document.querySelectorAll('.banner-url');
            let promises = [];
            
            els.forEach(el => {
                if(el.value.trim() !== "") {
                    // .push() ব্যবহার করলে আগেরগুলো ডিলিট হয় না, নতুন আইডি তৈরি হয়
                    promises.push(db.ref('banners').push({ url: el.value }));
                }
            });

            if(promises.length === 0) return alert("অন্তত একটি ব্যানার লিঙ্ক দিন!");

            Promise.all(promises).then(() => {
                alert("নতুন ব্যানার সফলভাবে যোগ হয়েছে!");
                // ইনপুট বক্সগুলো রিসেট করা
                document.getElementById('bannerInputs').innerHTML = '<input type="text" placeholder="ব্যানার ইমেজ ইউআরএল" class="premium-input banner-url">';
            });
        }

        db.ref('banners').on('value', snap => {
            const list = document.getElementById('activeBanners'); 
            list.innerHTML = "";
            if(!snap.exists()) {
                list.innerHTML = "<p class='text-gray-400 italic text-sm'>কোনো ব্যানার নেই</p>";
                return;
            }
            snap.forEach(child => {
                list.innerHTML += `
                    <div class="flex items-center justify-between bg-white p-2 rounded-lg border">
                        <img src="${child.val().url}" class="w-20 h-10 object-cover rounded">
                        <button onclick="deleteData('banners/${child.key}')" class="text-red-500 font-bold">ডিলিট</button>
                    </div>`;
            });
        });
        // ------------------------------

        function saveReport() {
            const num = document.getElementById('repNum').value;
            const msg = document.getElementById('repMsg').value;
            const photoEls = document.querySelectorAll('.rep-photo');
            let photos = [];
            photoEls.forEach(el => { if(el.value.trim() !== "") photos.push(el.value); });
            if(!num) return alert("নাম্বার দিন!");

            db.ref('reports/' + num).set({ num, message: msg, photos: photos })
            .then(() => {
                alert("রিপোর্ট সেভ হয়েছে!");
                document.getElementById('repNum').value = "";
                document.getElementById('repMsg').value = "";
                document.getElementById('repPhotoInputs').innerHTML = '<input type="text" placeholder="ছবির লিঙ্ক" class="premium-input rep-photo">';
            });
        }

        db.ref('reports').on('value', snap => {
            const list = document.getElementById('activeReportsList'); list.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                let imgHtml = '';
                if(r.photos) r.photos.forEach(img => { imgHtml += `<img src="${img}" class="preview-img">`; });
                list.innerHTML += `
                    <div class="list-item">
                        <div class="flex justify-between font-bold text-pink-600 mb-1">
                            <span>📱 ${r.num}</span>
                            <button onclick="deleteData('reports/${child.key}')" class="text-red-500 text-sm">ডিলিট</button>
                        </div>
                        <p class="text-sm text-gray-600 mb-2">${r.message}</p>
                        <div class="flex gap-2 overflow-x-auto">${imgHtml}</div>
                    </div>`;
            });
        });

        db.ref('pending_reports').on('value', snap => {
            const list = document.getElementById('pendingReportsList');
            list.innerHTML = snap.exists() ? "" : '<p class="text-gray-400 text-center italic">কোনো নতুন রিপোর্ট নেই</p>';
            snap.forEach(child => {
                const r = child.val();
                list.innerHTML += `
                    <div class="list-item border-orange-100 bg-orange-50/30">
                        <div class="flex justify-between font-bold text-orange-600 mb-1">
                            <span>📱 ${r.num} <span class="pending-badge">New</span></span>
                            <div class="flex gap-3">
                                <button onclick="approveReport('${child.key}')" class="text-green-600 text-sm">Approve ✅</button>
                                <button onclick="deleteData('pending_reports/${child.key}')" class="text-red-400 text-sm">ডিলিট</button>
                            </div>
                        </div>
                        <p class="text-sm text-gray-700">${r.message}</p>
                    </div>`;
            });
        });

        function approveReport(key) {
            db.ref('pending_reports/' + key).once('value', snap => {
                const d = snap.val();
                db.ref('reports/' + d.num).set(d).then(() => {
                    db.ref('pending_reports/' + key).remove();
                    alert("রিপোর্টটি পাবলিশ হয়েছে!");
                });
            });
        }

        function deleteData(path) {
            if(confirm("আপনি কি নিশ্চিত ডিলিট করতে চান?")) {
                db.ref(path).remove().then(() => alert("সফলভাবে ডিলিট হয়েছে।"));
            }
        }
    </script>
</body>
</html>
